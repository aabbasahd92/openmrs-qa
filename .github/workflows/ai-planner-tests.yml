name: AI Planner Smoke Tests

on:
  push:
    paths:
      - "ai_planner/**"
  pull_request:
    paths:
      - "ai_planner/**"
  workflow_dispatch:

jobs:
  planner-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          pip install anthropic pytest playwright

      - name: Run planner unit tests (mocked, no live API calls)
        run: pytest ai_planner/test_planner.py -v
